# Copy to /etc/cloudflared/config.yml
# Update the tunnel UUID + your DNS name.

tunnel: <TUNNEL_UUID_HERE>
credentials-file: /etc/cloudflared/<TUNNEL_UUID_HERE>.json

ingress:
  - hostname: secureops.yourdomain.com
    service: http://127.0.0.1:80

    # === WebSocket / SSH-Terminal settings ===
    # Cloudflare Tunnel supports WebSocket, but on Free plan idle WS
    # connections may be cut after ~100s.  These options keep terminals alive.
    originRequest:
      connectTimeout: 30s
      tlsTimeout:     30s
      tcpKeepAlive:   30s
      keepAliveConnections: 100
      keepAliveTimeout: 90s
      noTLSVerify:    true
      http2Origin:    false

  # Fallback rule (required)
  - service: http_status:404

# ---------------------------------------------------------------------------
# NOTE about long terminal sessions over Cloudflare Free:
#   • On Free plan, Cloudflare's proxy may close idle WebSockets after ~100s.
#   • Workaround 1: keep typing (any byte resets the idle timer).
#   • Workaround 2: upgrade to Pro ($20/mo) — extends idle to several minutes.
#   • Workaround 3: don't use Cloudflare — use nginx + Let's Encrypt instead
#     (no idle-timeout, supports arbitrary-length terminal sessions).
# ---------------------------------------------------------------------------
