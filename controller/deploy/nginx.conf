# SecureOps — nginx site config
#
# Install to /etc/nginx/sites-available/secureops, then:
#   sudo ln -s /etc/nginx/sites-available/secureops /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# The {{SERVER_NAME}} and {{FRONTEND_ROOT}} placeholders are replaced by
# deploy.sh.  For HTTPS, run `sudo certbot --nginx -d your-domain` afterwards.

# Map Upgrade header → Connection value (required for WebSocket terminal).
# This must live at the http {} level — if your nginx layout uses
# /etc/nginx/conf.d/*.conf or /etc/nginx/sites-enabled/*, this map is fine here.
map $http_upgrade $http_connection {
    default upgrade;
    ''      close;
}

server {
    listen      80;
    listen      [::]:80;
    server_name {{SERVER_NAME}};

    # ---------- Logs ----------
    access_log  /var/log/nginx/secureops.access.log;
    error_log   /var/log/nginx/secureops.error.log;

    # ---------- Limits ----------
    client_max_body_size 20m;

    # ---------- Frontend (static SPA build) ----------
    root  {{FRONTEND_ROOT}};
    index index.html;

    # Long-cache hashed assets
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the manifest / service worker / index.html
    location = /sw.js                  { add_header Cache-Control "no-cache"; expires 0; }
    location = /registerSW.js          { add_header Cache-Control "no-cache"; expires 0; }
    location = /manifest.webmanifest   { add_header Cache-Control "no-cache"; expires 0; }
    location = /index.html             { add_header Cache-Control "no-cache"; expires 0; }

    # ---------- WebSocket upgrade map (used by /api/terminal/...) ----------
    # Defined here so it works inside `location` below.

    # ---------- API reverse proxy ----------
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket support — passes through unchanged if Upgrade header absent
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $http_connection;

        proxy_connect_timeout 30s;
        proxy_send_timeout    7d;     # long-lived terminal sessions
        proxy_read_timeout    7d;

        proxy_buffering off;
    }

    # FastAPI Swagger UI
    location ~ ^/(docs|redoc|openapi.json)$ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------- SPA fallback — must be last ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---------- Security headers ----------
    add_header X-Frame-Options          "SAMEORIGIN"          always;
    add_header X-Content-Type-Options   "nosniff"             always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
}
